<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiale Pregătire BAC Matematică</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 15px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 2px 5px rgba(52, 152, 219, 0.3);
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-remediere {
            background-color: #e67e22;
            box-shadow: 0 2px 5px rgba(230, 126, 34, 0.3);
        }
        .btn-remediere:hover {
            background-color: #d35400;
        }
        .btn-subiect3 {
            background-color: #2ecc71;
            box-shadow: 0 2px 5px rgba(46, 204, 113, 0.3);
        }
        .btn-subiect3:hover {
            background-color: #27ae60;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pregătire BAC Matematică</h1>
    <p>Selectează fișa de lucru pe care vrei să o exersezi astăzi:</p>
    
    <div class="btn-list">
        <!-- Butoanele sunt legate EXACT de numele fișierelor tale (atenție la spații) -->
        <a href="Subiectul III.1 Derivate.html" class="btn btn-subiect3">📈 Subiectul III.1 — Derivate</a>
        <a href="Probabilitati.html" class="btn">🎲 Probabilități &amp; Combinatorică</a>
        <a href="Fisa BAC remediere 1.html" class="btn btn-remediere">🛠️ Fișă BAC Remediere 1</a>
        <a href="Fisa bac remediere 2.html" class="btn btn-remediere">🛠️ Fișă BAC Remediere 2</a>
    </div>
    
    <div class="footer">
        Succes la învățat!
    </div>
</div>

</body>
</html>
